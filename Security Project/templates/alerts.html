<!DOCTYPE html>
<html>
<head>
    <title>Alerts</title>
</head>

<body style="margin:0; font-family:Arial; background:#0f172a; color:white; padding:20px;">

<h1> Security Alerts</h1>

<div style="margin-top:20px; display:flex; flex-direction:column; gap:15px;">

{% for alert in alerts %}

<div style="
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    border-left:5px solid red;
">

    <h3 style="margin:0;">
        User: {{ alert[1] | safe }}
    </h3>

    <p>IP: {{ alert[2] }}</p>
    <p>Time: {{ alert[3] }}</p>

    <p style="color:orange;">
        Attack: {{ alert[4] }}
    </p>

    <div style="
        margin-top:10px;
        background:#020617;
        padding:10px;
        border-radius:8px;
        font-size:14px;
        white-space: pre-line;
        color:#f87171;
    ">
        {{ alert[5] }}
    </div>

</div>

{% endfor %}

</div>

</body>
</html>
