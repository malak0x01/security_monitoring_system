<!DOCTYPE html>
<html>
<head>
    <title>Logs</title>
</head>

<body style="margin:0; font-family:Arial; background:#0f172a; color:white; padding:20px;">

<h1> Activity Logs</h1>

<table style="width:100%; border-collapse:collapse; margin-top:20px;">

<tr style="background:#1e293b;">
    <th style="padding:10px;">Username</th>
    <th>Password</th>
    <th>IP</th>
    <th>Time</th>
    <th>Attack Type</th>
</tr>

{% for log in logs %}

<tr style="text-align:center; border-bottom:1px solid #334155;">
    <td style="padding:10px;">{{ log[1] }}</td>
    <td>{{ log[2] }}</td>
    <td>{{ log[3] }}</td>
    <td>{{ log[4] }}</td>
    <td style="color:orange;">{{ log[5] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
