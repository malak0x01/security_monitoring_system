<!DOCTYPE html>
<html>
<head>
    <title>Security Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; background:#0f172a; color:white; margin:0; padding:20px;">

<h1> Security Dashboard</h1>

<!-- Cards -->
<div style="display:flex; gap:20px; margin-top:20px;">

    <div style="padding:20px; background:#1e293b; border-radius:10px; flex:1;">
        <h2>Total Logs</h2>
        <h1>{{ total_logs }}</h1>
    </div>

    <div style="padding:20px; background:#1e293b; border-radius:10px; flex:1;">
        <h2>Total Alerts</h2>
        <h1>{{ total_alerts }}</h1>
    </div>

</div>

<br><br>

<h2> Attack Types Distribution</h2>

<canvas id="attackChart" width="400" height="200"></canvas>

<script>
const labels = JSON.parse('{{ labels | tojson | safe }}');
const values = JSON.parse('{{ values | tojson | safe }}');

const ctx = document.getElementById('attackChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Attacks Count',
            data: values,
            backgroundColor: 'red'
        }]
    }
});
</script>

</body>
</html>
